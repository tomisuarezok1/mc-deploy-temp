services:
  mission-control:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - /data/.openclaw:/data/.openclaw:ro
      - /data/.openclaw/workspace-cnbx/tasks.json:/data/.openclaw/workspace-cnbx/tasks.json:rw
      - ./modules:/app/modules
    environment:
      - OPENCLAW_GATEWAY_URL=ws://host.docker.internal:18789
      - OPENCLAW_DATA_PATA=/data/.openclaw
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped